<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Zhou</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #FFFFF0;
      font-family: 'Times New Roman', Times, serif;
      color: #333;
    }

    a { color: #0000EE; }
    a:visited { color: #551A8B; }
    a:hover { color: #FF0000; }

    hr {
      border: none;
      border-top: 1px solid #999;
      margin: 1.5rem 0;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-size: 2rem;
      margin: 0 0 0.25rem;
      font-weight: normal;
    }

    .subtitle {
      color: #666;
      font-style: italic;
      margin-bottom: 1rem;
    }

    .hit-counter {
      font-size: 0.8rem;
      color: #999;
      text-align: center;
      margin-top: 2rem;
      font-family: 'Courier New', monospace;
    }

    .hit-counter span {
      background: #000;
      color: #0f0;
      padding: 2px 6px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .section-header {
      font-size: 1.2rem;
      font-weight: bold;
      margin: 1.5rem 0 0.5rem;
      cursor: default;
    }

    .nav-list {
      list-style: disc;
      padding-left: 2rem;
      margin: 0.5rem 0;
    }

    .nav-list li {
      margin: 0.35rem 0;
      line-height: 1.5;
    }

    .dropdown-toggle {
      cursor: pointer;
      user-select: none;
    }

    .dropdown-toggle::before {
      content: '\25B6 ';
      font-size: 0.7rem;
      display: inline-block;
      transition: transform 0.15s;
    }

    .dropdown-toggle.open::before {
      transform: rotate(90deg);
    }

    .dropdown-content {
      display: none;
      padding-left: 1rem;
      margin-top: 0.25rem;
    }

    .dropdown-content.open {
      display: block;
    }

    .dropdown-content ul {
      list-style: circle;
      padding-left: 1.5rem;
      margin: 0.25rem 0;
    }

    .dropdown-content li {
      margin: 0.3rem 0;
    }

    .badge {
      font-size: 0.7rem;
      background: #FFD700;
      color: #333;
      padding: 1px 5px;
      font-family: 'Courier New', monospace;
      vertical-align: middle;
    }

    .blink {
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .webring {
      text-align: center;
      font-size: 0.85rem;
      margin-top: 1rem;
      padding: 0.75rem;
      border: 1px dashed #999;
    }

    .last-updated {
      font-size: 0.8rem;
      color: #888;
      font-style: italic;
    }

    .email-link {
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }

    @media (prefers-reduced-motion: reduce) {
      .blink { animation: none; }
      .dropdown-toggle::before { transition: none; }
    }
  </style>
</head>
<body>
  <div class="container">

    <h1>John Zhou</h1>
    <p class="subtitle">welcome to my corner of the internet</p>

    <hr>

    <!-- Life in NYC -->
    <p class="section-header">Life in NYC</p>
    <ul class="nav-list">
      <li><a href="recipes.html">Recipe Collection</a> &mdash; cooking adventures with Stephanie <span class="badge">NEW</span></li>
    </ul>

    <!-- Personal Projects -->
    <p class="section-header dropdown-toggle" onclick="toggleDropdown(this)">Personal Projects</p>
    <div class="dropdown-content">
      <ul>
        <li><a href="https://nyccomedy.org" target="_blank" rel="noopener">nyccomedy.org</a> &mdash; NYC comedy</li>
        <li><a href="https://stt.johnzhou.xyz" target="_blank" rel="noopener">commencement.stt</a> &mdash; speech-to-text</li>
      </ul>
    </div>

    <hr>

    <p class="last-updated">last updated: march 2026</p>

    <div class="hit-counter">
      you are visitor #<span>000042</span>
    </div>

    <div class="webring">
      &laquo; <a href="#">prev</a> |
      <span class="blink">*</span> johnzhou.xyz <span class="blink">*</span>
      | <a href="#">next</a> &raquo;
    </div>

  </div>

  <script>
    function toggleDropdown(el) {
      el.classList.toggle('open');
      const content = el.nextElementSibling;
      content.classList.toggle('open');
    }
  </script>
</body>
</html>
